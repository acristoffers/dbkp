# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

name: "dbkp"
arch: "${ARCH}"
platform: "linux"
version: "2.2.3"
section: "default"
priority: "extra"
maintainer: "Álan e Sousa <alan@esousa.me>"
description: "dotfiles backup and restore"
homepage: "https://github.com/acristoffers/dbkp"
license: "MPL"
release: "1${DIST_TAG}"
contents:
  - src: build-${ARCH}/dbkp
    dst: /usr/bin/dbkp
    file_info:
        mode: 0755
  - src: build/share/man/man1/dbkp.1
    dst: /usr/share/man/man1/dbkp.1
    file_info:
        mode: 0644
  - src: build/share/fish/completions/dbkp.fish
    dst: /usr/share/fish/vendor_completions.d/dbkp.fish
    file_info:
        mode: 0644
  - src: build/share/bash/completions/dbkp.bash
    dst: /usr/share/bash-completion/completions/dbkp
    file_info:
        mode: 0644
  - src: build/share/zsh/completions/_dbkp
    dst: /usr/share/zsh/site-functions/_dbkp
    file_info:
        mode: 0644
